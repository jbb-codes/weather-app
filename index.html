<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <script src="config.js" defer></script>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
  </head>

  <body>
    <main class="card">
      <!-- Search -->
      <header class="search-bar">
        <span class="material-symbols-outlined search-bar__icon">search</span>
        <input
          type="text"
          class="search-bar__input"
          placeholder="Search city..."
          autocomplete="off"
        />
        <button
          class="search-bar__btn search-bar__btn--search"
          aria-label="Search"
        >
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
        <button
          class="search-bar__btn search-bar__btn--geo"
          aria-label="Use my location"
        >
          <span class="material-symbols-outlined">my_location</span>
        </button>
      </header>

      <!-- Recent searches -->
      <div class="recent-searches" aria-label="Recent searches"></div>

      <!-- Weather info -->
      <section class="weather-info" style="display: none">
        <!-- Location + date -->
        <div class="weather-hero">
          <div class="weather-hero__location">
            <span class="material-symbols-outlined">location_on</span>
            <h4 class="weather-hero__city"></h4>
          </div>
          <span class="weather-hero__date regular-txt"></span>
        </div>

        <!-- Main temp block -->
        <div class="weather-main">
          <img src="" class="weather-main__icon" alt="Weather condition" />
          <div class="weather-main__info">
            <label class="unit-toggle" title="Toggle °F / °C">
              <input id="unit-slider" type="checkbox" />
              <span class="unit-toggle__track"></span>
              <span class="unit-toggle__label unit-toggle__label--f">°F</span>
              <span class="unit-toggle__label unit-toggle__label--c">°C</span>
            </label>
            <h1 class="weather-main__temp"></h1>
            <p class="weather-main__feels-like regular-txt"></p>
            <p class="weather-main__high-low regular-txt"></p>
            <p class="weather-main__condition"></p>
          </div>
        </div>

        <!-- Conditions grid -->
        <div class="conditions-grid">
          <div class="conditions-grid__item">
            <span class="material-symbols-outlined">water_drop</span>
            <span class="conditions-grid__label regular-txt">Humidity</span>
            <span class="conditions-grid__value humidity-value-txt"></span>
          </div>
          <div class="conditions-grid__item">
            <span class="material-symbols-outlined">air</span>
            <span class="conditions-grid__label regular-txt">Wind</span>
            <span class="conditions-grid__value wind-value-txt"></span>
          </div>
          <div class="conditions-grid__item">
            <span class="material-symbols-outlined">compress</span>
            <span class="conditions-grid__label regular-txt">Pressure</span>
            <span class="conditions-grid__value pressure-value-txt"></span>
          </div>
          <div class="conditions-grid__item">
            <span class="material-symbols-outlined">visibility</span>
            <span class="conditions-grid__label regular-txt">Visibility</span>
            <span class="conditions-grid__value visibility-value-txt"></span>
          </div>
          <div class="conditions-grid__item">
            <span class="material-symbols-outlined">wb_twilight</span>
            <span class="conditions-grid__label regular-txt">Sunrise</span>
            <span class="conditions-grid__value sunrise-value-txt"></span>
          </div>
          <div class="conditions-grid__item">
            <span class="material-symbols-outlined">nights_stay</span>
            <span class="conditions-grid__label regular-txt">Sunset</span>
            <span class="conditions-grid__value sunset-value-txt"></span>
          </div>
        </div>

        <!-- Air Quality -->
        <div class="aqi">
          <div class="aqi__header">
            <span class="regular-txt">Air Quality</span>
            <span class="aqi__label"></span>
          </div>
          <div
            class="aqi__bar"
            role="progressbar"
            aria-valuemin="1"
            aria-valuemax="5"
          >
            <div class="aqi__fill"></div>
          </div>
        </div>

        <!-- Hourly forecast -->
        <div class="hourly-forecast">
          <h6 class="hourly-forecast__title regular-txt">Today</h6>
          <div class="hourly-forecast__list"></div>
        </div>

        <!-- 5-day forecast -->
        <div class="daily-forecast">
          <h6 class="daily-forecast__title regular-txt">5-Day Forecast</h6>
          <div class="daily-forecast__list"></div>
        </div>
      </section>

      <!-- Search prompt -->
      <section class="section-message search-city">
        <img src="assets/message/search-city.png" alt="" />
        <div>
          <h1>Search City</h1>
          <h4 class="regular-txt">Find out the weather conditions of a city</h4>
        </div>
      </section>

      <!-- Not found -->
      <section class="section-message not-found" style="display: none">
        <img src="assets/message/not-found.png" alt="" />
        <div>
          <h1>Not Found</h1>
          <h4 class="not-found__message regular-txt">
            City not found — check the spelling and try again
          </h4>
        </div>
      </section>

      <!-- Loading -->
      <section class="loading" style="display: none">
        <div class="loading__spinner"></div>
      </section>
    </main>

    <!-- Hourly item template -->
    <template id="hourly-item-template">
      <div class="hourly-item">
        <span class="hourly-item__time regular-txt" data-template-time></span>
        <img class="hourly-item__img" data-template-img alt="" />
        <span class="hourly-item__temp" data-template-temp></span>
      </div>
    </template>

    <!-- Daily forecast item template -->
    <template id="forecast-item-template">
      <div class="forecast-item">
        <span class="forecast-item__date regular-txt" data-template-date></span>
        <img class="forecast-item__img" data-template-img alt="" />
        <span class="forecast-item__temp" data-template-temp></span>
        <span
          class="forecast-item__range regular-txt"
          data-template-range
        ></span>
      </div>
    </template>
  </body>
</html>
